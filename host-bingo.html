<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Host Dashboard</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #2c3e50; color: white; display: flex; flex-direction: column; align-items: center; }
        header { background-color: #1a252f; width: 100%; text-align: center; padding: 2vh 0; font-size: 3vh; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 90%; max-width: 800px; text-align: center; }
        
        /* Setup Phase */
        #setup-phase { background: rgba(255,255,255,0.1); padding: 4vh 4vw; border-radius: 15px; display: flex; flex-direction: column; gap: 1.5vh; align-items: center;}
        select, button { font-size: 3vh; padding: 1.5vh 2vw; border-radius: 8px; border: none; cursor: pointer; width: 100%; max-width: 400px;}
        .btn-start { background-color: #27ae60; color: white; font-weight: bold; margin-top: 2vh;}
        .btn-start:disabled { background-color: #7f8c8d; cursor: not-allowed; }
        .btn-start:hover:not(:disabled) { background-color: #2ecc71; }
        .btn-end { background-color: #e74c3c; color: white; font-weight: bold; font-size: 2vh; margin-top: 3vh;}
        
        /* Game Phase */
        #game-phase { display: none; width: 100%; }
        .room-code-display { font-size: 10vh; font-weight: 900; letter-spacing: 1vw; color: #f1c40f; text-shadow: 2px 2px 8px rgba(0,0,0,0.5); margin-bottom: 2vh;}
        .instruction { font-size: 4vh; margin-bottom: 4vh; }
        .current-word { font-size: 8vh; font-weight: bold; background: white; color: #2c3e50; padding: 3vh 5vw; border-radius: 15px; display: inline-block; min-width: 400px; min-height: 10vh; box-shadow: 0 10px 20px rgba(0,0,0,0.3); margin-bottom: 4vh;}
        .player-count { font-size: 3vh; color: #bdc3c7; margin-bottom: 2vh; }
        .btn-draw { background-color: #3498db; color: white; font-size: 4vh; font-weight: bold; padding: 3vh 6vw; border-radius: 50px; box-shadow: 0 8px 0 #2980b9; transition: all 0.1s; }
        .btn-draw:active { transform: translateY(8px); box-shadow: none; }

        /* Bingo Alert */
        #bingo-alert { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(231, 76, 60, 0.95); flex-direction: column; align-items: center; justify-content: center; z-index: 1000; animation: flash 1s infinite alternate;}
        #bingo-winner { font-size: 15vh; font-weight: 900; color: white; text-transform: uppercase; }
        .btn-dismiss { background: white; color: #e74c3c; font-size: 3vh; font-weight: bold; margin-top: 5vh; border-radius: 50px; }
        @keyframes flash { from { background: rgba(231, 76, 60, 0.95); } to { background: rgba(192, 57, 43, 0.95); } }

    </style>
</head>
<body>

    <header>Bingo: Teacher Controls</header>

    <div class="container">
        <div id="setup-phase">
            <h2 style="font-size: 4vh; margin: 0 0 2vh 0;">Configure Lesson</h2>
            
            <select id="gradeSelect">
                <option value="" disabled selected>Select Grade</option>
                <option value="grade3">Grade 3</option>
                <option value="grade4">Grade 4</option>
                <option value="grade5">Grade 5</option>
                <option value="grade6">Grade 6</option>
            </select>
            
            <select id="unitSelect" disabled>
                <option value="" disabled selected>Select Unit</option>
            </select>
            
            <select id="gridSelect" disabled style="display: none;">
                <option value="" disabled selected>Select Grid Size</option>
            </select>

            <select id="freeSpaceSelect" style="display: none;">
                <option value="no">No Free Space</option>
                <option value="yes">Include Center Free Space</option>
            </select>

            <button class="btn-start" id="createRoomBtn" disabled>Create Room</button>
        </div>

        <div id="game-phase">
            <div class="instruction">Join on your tablet using code:</div>
            <div class="room-code-display" id="roomCodeDisplay">ABCD</div>
            
            <div class="player-count">Students Connected: <span id="playerCount">0</span></div>
            
            <div class="current-word" id="currentWordDisplay">Waiting to draw...</div>
            <br>
            <button class="btn-draw" id="drawBtn">Draw Next Word</button>
            <br>
            <button class="btn-end" id="endGameBtn">End Game & Clear Room</button>
        </div>
    </div>

    <div id="bingo-alert">
        <div style="font-size: 8vh; font-weight: bold; margin-bottom: -2vh;">BINGO!</div>
        <div id="bingo-winner">Player</div>
        <button class="btn-dismiss" onclick="document.getElementById('bingo-alert').style.display='none'">Dismiss</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";

        // === INSERT YOUR KEYS HERE ===
        const firebaseConfig = {
            apiKey: "AIzaSyC7lrhVICmKOL3EhVkiaTkpEE1_VUDPS7k",
            authDomain: "levi-sensei.firebaseapp.com",
            databaseURL: "https://levi-sensei-default-rtdb.asia-southeast1.firebasedatabase.app/", // MAKE SURE THIS IS YOUR ACTUAL URL
            projectId: "levi-sensei",
            storageBucket: "levi-sensei.firebasestorage.app",
            messagingSenderId: "14792482782",
            appId: "1:14792482782:web:bdc4db039fabce6360474f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // State Variables
        let rawVocabData = {};
        let activeWordsPool = [];
        let calledWords = [];
        let currentRoomCode = "";

        // 1. Fetch JSON Data
        fetch('vocabulary.json')
            .then(response => response.json())
            .then(data => {
                rawVocabData = data;
                document.getElementById('gradeSelect').addEventListener('change', populateUnits);
            });

        // 2. Cascade Step 1: Populate Units (Filtering out units with < 9 words)
        function populateUnits(e) {
            const grade = e.target.value;
            const unitSelect = document.getElementById('unitSelect');
            
            // Reset downstream menus
            unitSelect.innerHTML = '<option value="" disabled selected>Select Unit</option>';
            document.getElementById('gridSelect').style.display = 'none';
            document.getElementById('freeSpaceSelect').style.display = 'none';
            document.getElementById('createRoomBtn').disabled = true;
            
            for (const unit in rawVocabData[grade]) {
                const wordCount = rawVocabData[grade][unit].length;
                if (wordCount >= 9) {
                    const option = document.createElement('option');
                    option.value = unit;
                    // Helpfully display the word count to the teacher
                    option.textContent = `${unit} (${wordCount} words)`;
                    unitSelect.appendChild(option);
                }
            }
            unitSelect.disabled = false;
        }

        // 3. Cascade Step 2: Show available Grid Sizes based on unit size
        document.getElementById('unitSelect').addEventListener('change', (e) => {
            const grade = document.getElementById('gradeSelect').value;
            const unit = e.target.value;
            const wordCount = rawVocabData[grade][unit].length;

            const gridSelect = document.getElementById('gridSelect');
            gridSelect.innerHTML = '<option value="" disabled selected>Select Grid Size</option>';
            
            // 3x3 is always available if it passed the unit filter
            gridSelect.appendChild(new Option('3x3 Grid (9 spaces)', '3'));
            
            if (wordCount >= 16) {
                gridSelect.appendChild(new Option('4x4 Grid (16 spaces)', '4'));
            }
            if (wordCount >= 25) {
                gridSelect.appendChild(new Option('5x5 Grid (25 spaces)', '5'));
            }

            gridSelect.style.display = 'block';
            gridSelect.disabled = false;
            document.getElementById('freeSpaceSelect').style.display = 'none';
            document.getElementById('createRoomBtn').disabled = true;
        });

        // 4. Cascade Step 3: Show Free Space toggle if applicable
        document.getElementById('gridSelect').addEventListener('change', (e) => {
            const gridSize = e.target.value;
            const freeSpaceSelect = document.getElementById('freeSpaceSelect');

            // 4x4 grids do not have a center square
            if (gridSize === '3' || gridSize === '5') {
                freeSpaceSelect.style.display = 'block';
                freeSpaceSelect.value = "no"; 
            } else {
                freeSpaceSelect.style.display = 'none';
                freeSpaceSelect.value = "no"; 
            }

            document.getElementById('createRoomBtn').disabled = false;
        });

        // 5. Create Room Logic
        document.getElementById('createRoomBtn').addEventListener('click', () => {
            const grade = document.getElementById('gradeSelect').value;
            const unit = document.getElementById('unitSelect').value;
            const gridSize = parseInt(document.getElementById('gridSelect').value);
            const hasFreeSpace = document.getElementById('freeSpaceSelect').value === "yes";

            activeWordsPool = [...rawVocabData[grade][unit]];
            
            // Generate 4-letter room code
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            currentRoomCode = "";
            for(let i=0; i<4; i++) currentRoomCode += chars.charAt(Math.floor(Math.random() * chars.length));

            // Push settings to Firebase so tablets know how to build the board
            const roomRef = ref(db, `bingoRooms/${currentRoomCode}`);
            set(roomRef, {
                status: "active",
                grade: grade,
                unit: unit,
                gridSize: gridSize,
                hasFreeSpace: hasFreeSpace,
                currentWord: "",
                calledWords: []
            });

            // Update UI
            document.getElementById('setup-phase').style.display = 'none';
            document.getElementById('game-phase').style.display = 'block';
            document.getElementById('roomCodeDisplay').textContent = currentRoomCode;

            // Listen for Players & Bingo triggers
            onValue(ref(db, `bingoRooms/${currentRoomCode}/players`), (snapshot) => {
                const players = snapshot.val();
                let count = 0;
                if (players) {
                    count = Object.keys(players).length;
                    for(const uid in players) {
                        if(players[uid].hasBingo === true) {
                            document.getElementById('bingo-winner').textContent = players[uid].name;
                            document.getElementById('bingo-alert').style.display = 'flex';
                            update(ref(db, `bingoRooms/${currentRoomCode}/players/${uid}`), { hasBingo: false });
                        }
                    }
                }
                document.getElementById('playerCount').textContent = count;
            });
        });

        // 6. Draw Word Logic
        document.getElementById('drawBtn').addEventListener('click', () => {
            if (activeWordsPool.length === 0) {
                document.getElementById('currentWordDisplay').textContent = "NO WORDS LEFT!";
                return;
            }

            const randomIndex = Math.floor(Math.random() * activeWordsPool.length);
            const drawnWord = activeWordsPool.splice(randomIndex, 1)[0];
            calledWords.push(drawnWord);

            document.getElementById('currentWordDisplay').textContent = drawnWord;

            const utterance = new SpeechSynthesisUtterance(drawnWord);
            utterance.lang = 'en-US'; 
            utterance.rate = 0.8; 
            window.speechSynthesis.speak(utterance);

            update(ref(db, `bingoRooms/${currentRoomCode}`), {
                currentWord: drawnWord,
                calledWords: calledWords
            });
        });

        // 7. Janitor Protocol
        document.getElementById('endGameBtn').addEventListener('click', () => {
            if(confirm("Are you sure you want to end the game? This will disconnect all students.")) {
                remove(ref(db, `bingoRooms/${currentRoomCode}`));
                location.reload(); 
            }
        });
    </script>
</body>
</html>
