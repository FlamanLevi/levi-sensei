<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo Host Dashboard</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #2c3e50; color: white; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        header { background-color: #1a252f; width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.5vh; padding: 2vh 0; box-shadow: 0 4px 6px rgba(0,0,0,0.3); flex-shrink: 0; }
        .header-title { font-size: 3vh; font-weight: bold; text-align: center; padding: 0 2vw; }
        #langSelect { font-size: 2vh; padding: 0.5vh 1vw; border-radius: 5px; cursor: pointer; }

        .container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; width: 90%; max-width: 800px; text-align: center; padding: 2vh 0; overflow-y: auto; box-sizing: border-box; }
        
        details { background: rgba(255,255,255,0.05); width: 100%; max-width: 600px; border-radius: 10px; margin-bottom: 2vh; text-align: left; padding: 1vh 2vw; box-sizing: border-box; }
        summary { font-size: 2.5vh; font-weight: bold; cursor: pointer; color: #3498db; outline: none; }
        .inst-list { margin-top: 1vh; font-size: 2vh; line-height: 1.5; color: #bdc3c7; }

        #setup-phase { background: rgba(255,255,255,0.1); padding: 3vh 4vw; border-radius: 15px; display: flex; flex-direction: column; gap: 1.5vh; align-items: center; width: 100%; max-width: 600px; box-sizing: border-box;}
        select, button { font-size: 3vh; padding: 1.5vh 2vw; border-radius: 8px; border: none; cursor: pointer; width: 100%; }
        .toggle-label { font-size: 2.5vh; display: flex; align-items: center; gap: 1vw; cursor: pointer; margin-top: 1vh; background: rgba(0,0,0,0.2); padding: 1vh 2vw; border-radius: 8px; width: 100%; box-sizing: border-box;}
        
        #game-phase { display: none; width: 100%; }
        .room-code-display { font-size: 10vh; font-weight: 900; letter-spacing: 1vw; color: #f1c40f; text-shadow: 2px 2px 8px rgba(0,0,0,0.5); margin: 2vh 0;}
        .current-word { font-size: 8vh; font-weight: bold; background: white; color: #2c3e50; padding: 3vh 5vw; border-radius: 15px; display: inline-block; min-width: 300px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); margin-bottom: 2vh;}
        
        .btn-start { background-color: #27ae60; color: white; font-weight: bold; margin-top: 2vh;}
        .btn-draw { background-color: #3498db; color: white; font-size: 4vh; font-weight: bold; padding: 3vh 6vw; border-radius: 50px; box-shadow: 0 8px 0 #2980b9; transition: all 0.1s; }
        .btn-draw:active { transform: translateY(8px); box-shadow: none; }
        .btn-end { background-color: #e74c3c; color: white; font-weight: bold; font-size: 2vh; margin-top: 5vh; width: auto; padding: 1.5vh 4vw;}

        #history-panel { margin-top: 4vh; background: rgba(0,0,0,0.2); border-radius: 10px; padding: 2vh; max-height: 12vh; overflow-y: auto; display: flex; flex-wrap: wrap; gap: 1vh; justify-content: center; width: 100%; box-sizing: border-box;}
        .history-tag { background: #7f8c8d; padding: 0.8vh 1.5vw; border-radius: 5px; font-size: 2vh; font-weight: bold; }

        #podium-panel { margin-top: 3vh; background: rgba(0, 0, 0, 0.3); border-radius: 15px; padding: 2vh 4vw; border: 2px solid #34495e; width: 100%; box-sizing: border-box; display: none;}
        #podium-list { list-style: none; padding: 0; margin: 0; font-size: 3vh; font-weight: bold; }
        .podium-entry { display: flex; justify-content: space-between; padding: 1vh 0; border-bottom: 1px solid rgba(255,255,255,0.1); text-transform: uppercase; }
        .rank-1 { color: #f1c40f; } .rank-2 { color: #bdc3c7; } .rank-3 { color: #cd7f32; }

        /* FIXED OVERLAYS */
        #bingo-alert, #game-over-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            flex-direction: column; align-items: center; justify-content: center; z-index: 9999; 
        }
        #bingo-alert { background: rgba(231, 76, 60, 0.98); animation: flash 0.5s infinite alternate; }
        #game-over-overlay { background: rgba(0, 0, 0, 0.9); }
        
        #bingo-winner { font-size: 12vh; font-weight: 900; color: white; text-transform: uppercase; text-align: center;}
        @keyframes flash { from { background: rgba(231, 76, 60, 1); } to { background: rgba(192, 57, 43, 1); } }
    </style>
</head>
<body>

    <header>
        <div class="header-title" data-i18n="header">Bingo: Teacher Controls</div>
        <select id="langSelect">
            <option value="en">English</option>
            <option value="ja">日本語</option>
        </select>
    </header>

    <div class="container">
        <details id="instruction-panel">
            <summary data-i18n="instructionsTitle">Instructions / 使い方</summary>
            <div class="inst-list">
                <div data-i18n="step1">1. Select Grade and Unit.</div>
                <div data-i18n="step2">2. Choose Grid Size and Mode.</div>
                <div data-i18n="step4">3. Click 'Create Room' and share code.</div>
                <div data-i18n="step5">4. Draw words until the end condition is met.</div>
            </div>
        </details>

        <div id="setup-phase">
            <h2 data-i18n="configHeader">Configure Lesson</h2>
            <select id="gradeSelect">
                <option value="" disabled selected data-i18n="selGrade">Select Grade</option>
                <option value="grade3">Grade 3</option>
                <option value="grade4">Grade 4</option>
                <option value="grade5">Grade 5</option>
                <option value="grade6">Grade 6</option>
            </select>
            <select id="unitSelect" disabled><option value="" disabled selected data-i18n="selUnit">Select Unit</option></select>
            <select id="gridSelect" disabled style="display: none;"></select>
            <select id="modeSelect" style="display: none;">
                <option value="standard" data-i18n="modeStandard">Standard (Race to Grid Size)</option>
                <option value="sprint" data-i18n="modeSprint">Sprint (50% Unit Draw)</option>
                <option value="podium" data-i18n="modePodium">Podium Cap (Fill Podium)</option>
                <option value="blackout" data-i18n="modeBlackout">Blackout (Play to End)</option>
            </select>
            <select id="freeSpaceSelect" style="display: none;">
                <option value="no" data-i18n="noFree">No Free Space</option>
                <option value="yes" data-i18n="yesFree">Include Center Free Space</option>
            </select>
            <label class="toggle-label"><input type="checkbox" id="muteToggle"><span data-i18n="muteToggle">Mute Auto-Voice</span></label>
            <button class="btn-start" id="createRoomBtn" disabled data-i18n="createBtn">Create Room</button>
        </div>

        <div id="game-phase">
            <div data-i18n="joinInst">Join using code:</div>
            <div class="room-code-display" id="roomCodeDisplay">----</div>
            <div id="draw-stats" style="margin-bottom: 1vh; font-size: 2.5vh; color: #bdc3c7;"></div>
            <div class="current-word" id="currentWordDisplay" data-i18n="waitDraw">Waiting...</div>
            <br>
            <button class="btn-draw" id="drawBtn" data-i18n="drawBtn">Draw Next Word</button>
            <div id="history-panel"></div>
            <div id="podium-panel"><h3 data-i18n="podiumTitle">Winners Podium</h3><div id="podium-list"></div></div>
            <button class="btn-end" id="endGameBtn" data-i18n="endBtn">End Game</button>
        </div>
    </div>

    <div id="bingo-alert">
        <div style="font-size: 6vh; font-weight: bold;">BINGO!</div>
        <div id="bingo-winner">Player</div>
        <button onclick="document.getElementById('bingo-alert').style.display='none'" style="width: auto; margin-top: 5vh; padding: 2vh 10vw;" data-i18n="dismissBtn">Dismiss</button>
    </div>

    <div id="game-over-overlay">
        <h1 style="font-size: 10vh; color: #e74c3c;">GAME OVER</h1>
        <button onclick="location.reload()" style="width: auto; margin-top: 5vh; padding: 2vh 10vw;">New Game</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC7lrhVICmKOL3EhVkiaTkpEE1_VUDPS7k",
            authDomain: "levi-sensei.firebaseapp.com",
            databaseURL: "https://levi-sensei-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "levi-sensei",
            storageBucket: "levi-sensei.firebasestorage.app",
            messagingSenderId: "14792482782",
            appId: "1:14792482782:web:bdc4db039fabce6360474f"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const i18n = {
            en: {
                header: "Bingo: Teacher Controls", instructionsTitle: "Instructions / 使い方",
                configHeader: "Configure Lesson", selGrade: "Select Grade", selUnit: "Select Unit", selGrid: "Select Grid",
                modeStandard: "Standard (Race to Grid Size)", modeSprint: "Sprint (50% Unit Draw)",
                modePodium: "Podium Cap (Fill Top Spots)", modeBlackout: "Blackout (Play to End)",
                noFree: "No Free Space", yesFree: "Include Free Space", muteToggle: "Mute Auto-Voice",
                createBtn: "Create Room", joinInst: "Join using code:", waitDraw: "Waiting...",
                drawBtn: "Draw Next Word", endBtn: "End Game", podiumTitle: "Podium",
                drawCount: "Draws: ", drawLimit: " / Limit: ", dismissBtn: "Dismiss"
            },
            ja: {
                header: "ビンゴ：教師用ダッシュボード", instructionsTitle: "使い方",
                configHeader: "レッスンの設定", selGrade: "学年を選択", selUnit: "単元を選択", selGrid: "サイズを選択",
                modeStandard: "標準 (グリッドサイズで終了)", modeSprint: "スプリント (50%終了)",
                modePodium: "ポディウム (上位が決まったら終了)", modeBlackout: "ブラックアウト (最後まで)",
                noFree: "なし", yesFree: "あり", muteToggle: "ミュート",
                createBtn: "ルーム作成", joinInst: "コードを入力：", waitDraw: "待機中...",
                drawBtn: "単語を引く", endBtn: "終了", podiumTitle: "達成者リスト",
                drawCount: "抽選: ", drawLimit: " / 制限: ", dismissBtn: "閉じる"
            }
        };

        let currentLang = 'en', rawVocabData = {}, activeWordsPool = [], calledWords = [], currentRoomCode = "", gameActive = false;
        let selectedGridSize = 3, selectedMode = 'standard', sprintLimit = 0;

        fetch('vocabulary.json').then(r => r.json()).then(d => {
            rawVocabData = d;
            document.getElementById('gradeSelect').addEventListener('change', e => {
                const uSel = document.getElementById('unitSelect');
                uSel.innerHTML = `<option value="" disabled selected>${i18n[currentLang].selUnit}</option>`;
                for (const u in rawVocabData[e.target.value]) {
                    if (rawVocabData[e.target.value][u].length >= 9) uSel.add(new Option(u, u));
                }
                uSel.disabled = false;
            });
        });

        document.getElementById('unitSelect').addEventListener('change', e => {
            const gSel = document.getElementById('gridSelect');
            gSel.innerHTML = `<option value="" disabled selected>${i18n[currentLang].selGrid}</option>`;
            gSel.add(new Option("3x3", "3"));
            const count = rawVocabData[document.getElementById('gradeSelect').value][e.target.value].length;
            if (count >= 16) gSel.add(new Option("4x4", "4"));
            if (count >= 25) gSel.add(new Option("5x5", "5"));
            gSel.style.display = 'block'; gSel.disabled = false;
        });

        document.getElementById('gridSelect').addEventListener('change', e => {
            selectedGridSize = parseInt(e.target.value);
            document.getElementById('modeSelect').style.display = 'block';
            document.getElementById('freeSpaceSelect').style.display = (selectedGridSize % 2 !== 0) ? 'block' : 'none';
            document.getElementById('createRoomBtn').disabled = false;
        });

        document.getElementById('createRoomBtn').addEventListener('click', () => {
            selectedMode = document.getElementById('modeSelect').value;
            const grade = document.getElementById('gradeSelect').value;
            const unit = document.getElementById('unitSelect').value;
            activeWordsPool = [...rawVocabData[grade][unit]];
            sprintLimit = Math.floor(activeWordsPool.length * 0.5);
            gameActive = true;

            const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ";
            currentRoomCode = "";
            for(let i=0; i<4; i++) currentRoomCode += chars.charAt(Math.floor(Math.random() * chars.length));

            set(ref(db, `bingoRooms/${currentRoomCode}`), {
                status: "active", grade, unit, gridSize: selectedGridSize,
                hasFreeSpace: document.getElementById('freeSpaceSelect').value === "yes",
                calledWords: []
            });

            document.getElementById('setup-phase').style.display = 'none';
            document.getElementById('game-phase').style.display = 'block';
            document.getElementById('roomCodeDisplay').textContent = currentRoomCode;

            onValue(ref(db, `bingoRooms/${currentRoomCode}/players`), snap => {
                if (!gameActive) return;
                const players = snap.val() || {}, winners = [];
                for (const id in players) {
                    const p = players[id];
                    if (p.bingoCount > 0) winners.push({ name: p.name, count: p.bingoCount });
                    if (p.bingoCount > (p.lastProcessedCount || 0)) {
                        document.getElementById('bingo-winner').textContent = p.name;
                        document.getElementById('bingo-alert').style.display = 'flex';
                        update(ref(db, `bingoRooms/${currentRoomCode}/players/${id}`), { lastProcessedCount: p.bingoCount });
                    }
                }
                winners.sort((a, b) => b.count - a.count);
                const pList = document.getElementById('podium-list'); pList.innerHTML = '';
                winners.forEach((w, i) => {
                    const el = document.createElement('div');
                    el.className = `podium-entry rank-${i < 3 ? i + 1 : 'other'}`;
                    el.innerHTML = `<span>${i + 1}. ${w.name}</span><span>${w.count}</span>`;
                    pList.appendChild(el);
                });
                if (winners.length > 0) document.getElementById('podium-panel').style.display = 'block';
                checkEndConditions(winners);
            });
        });

        function checkEndConditions(winners) {
            if (!gameActive) return;
            let over = false;
            if (selectedMode === 'standard' && winners.some(w => w.count >= selectedGridSize)) over = true;
            if (selectedMode === 'podium' && winners.length >= selectedGridSize) over = true;
            if (over) endGame();
        }

        document.getElementById('drawBtn').addEventListener('click', () => {
            if (!gameActive || activeWordsPool.length === 0) return;
            const word = activeWordsPool.splice(Math.floor(Math.random() * activeWordsPool.length), 1)[0];
            calledWords.push(word);
            document.getElementById('currentWordDisplay').textContent = word;
            const h = document.getElementById('history-panel'), tag = document.createElement('div');
            tag.className = 'history-tag'; tag.textContent = word; h.appendChild(tag); h.scrollTop = h.scrollHeight;
            if (!document.getElementById('muteToggle').checked) {
                const u = new SpeechSynthesisUtterance(word); u.lang = 'en-US'; window.speechSynthesis.speak(u);
            }
            update(ref(db, `bingoRooms/${currentRoomCode}`), { currentWord: word, calledWords: calledWords });
            const stats = document.getElementById('draw-stats');
            if (selectedMode === 'sprint') {
                stats.textContent = `${i18n[currentLang].drawCount}${calledWords.length}${i18n[currentLang].drawLimit}${sprintLimit}`;
                if (calledWords.length >= sprintLimit) endGame();
            } else stats.textContent = `${i18n[currentLang].drawCount}${calledWords.length}`;
        });

        function endGame() {
            gameActive = false;
            document.getElementById('drawBtn').disabled = true;
            document.getElementById('game-over-overlay').style.display = 'flex';
        }

        document.getElementById('endGameBtn').addEventListener('click', () => { 
            if(confirm("End game?")) remove(ref(db, `bingoRooms/${currentRoomCode}`)).then(() => location.reload()); 
        });
        
        document.getElementById('langSelect').addEventListener('change', e => {
            currentLang = e.target.value;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[currentLang][key]) el.textContent = i18n[currentLang][key];
            });
        });
    </script>
</body>
</html>
