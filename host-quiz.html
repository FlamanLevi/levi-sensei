<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Levi-Sensei Trivia: Control Hub</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; padding: 20px; color: #333; }
        .panel { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { border-bottom: 2px solid #007bff; padding-bottom: 5px; color: #2c3e50; margin-top: 25px; }
        
        .master-controls { margin-bottom: 15px; font-size: 14px; display: flex; gap: 10px; }
        .master-controls a { text-decoration: none; font-weight: bold; padding: 5px 10px; border-radius: 4px; background: #f0f0f0; color: #333; border: 1px solid #ccc; }

        .checkbox-container { display: flex; align-items: center; margin-bottom: 8px; font-size: 16px; cursor: pointer; }
        .checkbox-container input { width: 18px; height: 18px; margin-right: 10px; cursor: pointer; }
        .unit-section { margin-left: 20px; margin-top: 5px; padding: 10px; border-left: 3px solid #ccc; display: none; }
        
        .color-g3 { color: #d81b60; border-left-color: #d81b60; }
        .color-g4 { color: #2e7d32; border-left-color: #2e7d32; }
        .color-g5 { color: #e67e22; border-left-color: #e67e22; }
        .color-g6 { color: #1976d2; border-left-color: #1976d2; }

        .matrix-container { display: flex; gap: 40px; background: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #dee2e6; flex-wrap: wrap; }
        .matrix-column { flex: 1; min-width: 250px; }
        .mode-cb:disabled { cursor: not-allowed; opacity: 0.5; }

        .control-btn { font-size: 1.2em; padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); transition: 0.2s; }
        .control-btn:hover { background-color: #218838; transform: translateY(-2px); }
        .live-counter { margin-left: 15px; color: #e67e22; font-weight: bold; font-size: 0.9em; background: #fff3e0; padding: 3px 8px; border-radius: 12px; }
        
        #game-screen { display: none; text-align: center; }
        #room-code-display { font-size: 6em; font-weight: bold; color: #007bff; letter-spacing: 10px; margin: 10px 0; }
        #current-question-display { font-size: 3em; margin: 20px 0; font-weight: bold; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
        
        #player-list { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin: 20px 0; padding: 20px; background: #f8f9fa; border-radius: 10px; min-height: 50px; }
        .player-tag { background: #e0f7fa; color: #006064; padding: 10px 20px; border-radius: 25px; font-weight: bold; font-size: 1.2em; }

        .leaderboard-row { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 15px 30px; margin: 0 auto 10px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-size: 1.5em; width: 80%; max-width: 600px; }
        .rank-1 { background: #fff3cd; border: 2px solid #ffeeba; } 
        .rank-2 { background: #e2e3e5; border: 2px solid #d6d8db; } 
        .rank-3 { background: #f8d7da; border: 2px solid #f5c6cb; } 

        #timer-bar-container { display: none; width: 80%; height: 25px; background: #e9ecef; border-radius: 15px; margin: 0 auto 20px; overflow: hidden; }
        #timer-bar { width: 100%; height: 100%; background: #28a745; transition: width 0.1s linear, background-color 0.3s; }
    </style>
</head>
<body>

    <div id="setup-screen" class="panel">
        <h1>Game Setup (Host)</h1>
        
        <h2>1. Select Units</h2>
        <div class="master-controls">
            <a href="#" onclick="toggleAll(true); return false;">Check All</a>
            <a href="#" onclick="toggleAll(false); return false;">Clear All</a>
        </div>
        <div id="unit-selector"></div>

        <h2>2. Game Settings</h2>
        
        <div style="margin-bottom: 15px;">
            <label style="font-weight: bold;">Number of Questions: </label>
            <select id="question-count">
                <option value="5">5 Questions (Sprint)</option>
                <option value="10" selected>10 Questions (Standard)</option>
                <option value="15">15 Questions</option>
                <option value="20">20 Questions</option>
                <option value="30">30 Questions</option>
                <option value="-1">All Selected Words (Endurance)</option>
            </select>
            <span id="pool-size-display" class="live-counter">Words in pool: 0</span>
        </div>

        <div style="margin-bottom: 25px;">
            <label style="font-weight: bold;">Time per question: </label>
            <select id="time-limit">
                <option value="5000">5 Seconds (Hard)</option>
                <option value="10000" selected>10 Seconds (Medium)</option>
                <option value="15000">15 Seconds (Easy)</option>
                <option value="20000">20 Seconds (Very Easy)</option>
            </select>
        </div>

        <div class="matrix-container">
            <div class="matrix-column">
                <h3 style="margin-top:0;">Main Screen (Prompt)</h3>
                <label class="checkbox-container"><input type="checkbox" class="mode-cb prompt-cb" value="img"> Image</label>
                <label class="checkbox-container"><input type="checkbox" class="mode-cb prompt-cb" value="en"> English Spelling</label>
                <label class="checkbox-container"><input type="checkbox" class="mode-cb prompt-cb" value="ja_hiragana"> Japanese (Hiragana)</label>
                <label class="checkbox-container"><input type="checkbox" class="mode-cb prompt-cb" value="en_katakana"> English Pronunciation (Katakana)</label>
                <label class="checkbox-container"><input type="checkbox" class="mode-cb prompt-cb" value="ja_kanji"> Japanese (Kanji)</label>
            </div>
            <div class="matrix-column">
                <h3 style="margin-top:0;">Tablets (Options)</h3>
                <label class="checkbox-container"><input type="checkbox" class="mode-cb option-cb" value="img"> Image</label>
                <label class="checkbox-container"><input type="checkbox" class="mode-cb option-cb" value="en"> English Spelling</label>
                <label class="checkbox-container"><input type="checkbox" class="mode-cb option-cb" value="ja_hiragana"> Japanese (Hiragana)</label>
                <label class="checkbox-container"><input type="checkbox" class="mode-cb option-cb" value="en_katakana"> English Pronunciation (Katakana)</label>
                <label class="checkbox-container"><input type="checkbox" class="mode-cb option-cb" value="ja_kanji"> Japanese (Kanji)</label>
            </div>
        </div>
        <button class="control-btn" onclick="initializeGame()">Create Room</button>
    </div>

    <div id="game-screen" class="panel">
        <div id="lobby-ui">
            <h2>Join on Tablets: <span id="room-code-display"></span></h2>
            <p>Students Connected: <span id="student-count">0</span></p>
            <div id="player-list"></div>
        </div>
        <div id="timer-bar-container"><div id="timer-bar"></div></div>
        <div id="current-question-display"></div>
        <button class="control-btn" onclick="handleGameFlow()" id="main-action-btn">Start Game</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC7lrhVICmKOL3EhVkiaTkpEE1_VUDPS7k",
            authDomain: "levi-sensei.firebaseapp.com",
            databaseURL: "https://levi-sensei-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "levi-sensei",
            storageBucket: "levi-sensei.firebasestorage.app",
            messagingSenderId: "14792482782",
            appId: "1:14792482782:web:13ae42685a94b96460474f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let vocabularyData = {}, questionQueue = [], currentQuestionIndex = 0;
        let selectedTimeLimit = 15000, roomCode = "", livePlayersData = {}, gamePhase = "LOBBY", countdownInterval;

        const gradeConfig = {
            "grade3": { name: "Grade 3", colorClass: "g3" },
            "grade4": { name: "Grade 4", colorClass: "g4" },
            "grade5": { name: "Grade 5", colorClass: "g5" },
            "grade6": { name: "Grade 6", colorClass: "g6" }
        };

        fetch('vocabulary.json').then(r => r.json()).then(d => { vocabularyData = d; buildSetupUI(d); });

        function buildSetupUI(data) {
            const container = document.getElementById("unit-selector");
            for (const grade in data) {
                if (!gradeConfig[grade]) continue;
                const colorId = gradeConfig[grade].colorClass;

                // Bold labels
                const gradeLabel = document.createElement('label');
                gradeLabel.className = `checkbox-container color-${colorId}`;
                gradeLabel.style.fontWeight = "bold";
                gradeLabel.innerHTML = `<input type="checkbox" class="grade-checkbox" data-grade="${grade}"> ${gradeConfig[grade].name}`;
                gradeLabel.querySelector('input').onchange = toggleDrawer;
                container.appendChild(gradeLabel);

                const unitSection = document.createElement('div');
                unitSection.id = `units-${grade}`;
                unitSection.className = `unit-section color-${colorId}`;
                for (const unit in data[grade]) {
                    unitSection.innerHTML += `<label class="checkbox-container" style="color:#333;"><input type="checkbox" class="unit-cb" value="${grade}|${unit}" onchange="updatePoolCounter()"> ${unit}</label>`;
                }
                container.appendChild(unitSection);
            }
        }

        function toggleDrawer(e) {
            const section = document.getElementById(`units-${e.target.dataset.grade}`);
            section.style.display = e.target.checked ? 'block' : 'none';
        }

        function updatePoolCounter() {
            let count = 0;
            document.querySelectorAll('.unit-cb:checked').forEach(cb => {
                const [g, u] = cb.value.split('|');
                count += vocabularyData[g][u].length;
            });
            document.getElementById('pool-size-display').innerText = `Words in pool: ${count}`;
        }

        function toggleAll(force) {
            document.querySelectorAll('.grade-checkbox').forEach(cb => { cb.checked = force; toggleDrawer({target: cb}); });
            document.querySelectorAll('.unit-cb').forEach(cb => { cb.checked = force; });
            updatePoolCounter();
        }

        // Matrix Interlock Logic
        document.querySelectorAll('.mode-cb').forEach(cb => {
            cb.onchange = (e) => {
                const val = e.target.value;
                const isPrompt = e.target.classList.contains('prompt-cb');
                const opposing = document.querySelector(isPrompt ? `.option-cb[value="${val}"]` : `.prompt-cb[value="${val}"]`);
                if (opposing) { 
                    opposing.disabled = e.target.checked; 
                    opposing.parentElement.style.opacity = e.target.checked ? '0.5' : '1'; 
                    if(e.target.checked) opposing.checked = false;
                }
            };
        });

        function shuffle(a) { return a.sort(() => Math.random() - 0.5); }

        function initializeGame() {
            const checkboxes = document.querySelectorAll('.unit-cb:checked');
            let selectedItems = [], selectedUnits = [];
            checkboxes.forEach(cb => {
                const [g, u] = cb.value.split('|');
                selectedUnits.push(vocabularyData[g][u]);
                selectedItems = selectedItems.concat(vocabularyData[g][u]);
            });
            if (selectedItems.length < 4) return alert("Select at least 4 words!");

            let basePool = [];
            selectedUnits.forEach(unitArray => {
                unitArray.forEach(item => {
                    let opts = shuffle([...selectedItems]).filter(i => i.id !== item.id).slice(0, 3);
                    opts.push(item);
                    basePool.push({ target: item, options: shuffle(opts) });
                });
            });

            const count = parseInt(document.getElementById("question-count").value);
            questionQueue = (count === -1) ? shuffle(basePool) : Array.from({length: count}, (_, i) => basePool[i % basePool.length]).sort(() => 0.5 - Math.random());

            selectedTimeLimit = parseInt(document.getElementById("time-limit").value);
            roomCode = Math.floor(1000 + Math.random() * 9000).toString();
            document.getElementById("setup-screen").style.display = "none";
            document.getElementById("game-screen").style.display = "block";
            document.getElementById("room-code-display").innerText = roomCode;

            db.ref('trivia/room').set({ roomCode, status: "LOBBY" });
            db.ref('trivia/players').on('value', snap => {
                livePlayersData = snap.val() || {};
                document.getElementById('student-count').innerText = Object.keys(livePlayersData).length;
                if (gamePhase === "LOBBY") document.getElementById('player-list').innerHTML = Object.values(livePlayersData).map(p => `<div class="player-tag">${p.name}</div>`).join('');
            });
        }

        function handleGameFlow() {
            if (gamePhase === "LOBBY" || gamePhase === "LEADERBOARD") startNextQuestion();
            else if (gamePhase === "QUESTION") revealAnswer();
            else if (gamePhase === "REVEAL") showLeaderboard();
        }

        function startNextQuestion() {
            if (currentQuestionIndex >= questionQueue.length) {
                showLeaderboard(true);
                db.ref('trivia/gameState').set({ status: "GAME_OVER" });
                
                // Nuclear Reset Button Logic
                const btn = document.getElementById("main-action-btn");
                btn.innerText = "End Game & Eject Players";
                btn.style.backgroundColor = "#dc3545"; // Warning Red
                btn.onclick = function() {
                    btn.innerText = "Closing Room...";
                    db.ref('trivia/gameState').set({ status: "CLOSED" });
                    setTimeout(() => {
                        db.ref('trivia').remove().then(() => {
                            location.reload(); 
                        });
                    }, 2000);
                };
                return;
            }
            
            gamePhase = "QUESTION";
            document.getElementById('lobby-ui').style.display = "none";
            document.getElementById('timer-bar-container').style.display = "block";
            
            // Clean data purge before new question
            db.ref('trivia/gameState/responses').set(null).then(() => {
                const q = questionQueue[currentQuestionIndex];
                const prompts = Array.from(document.querySelectorAll('.prompt-cb:checked')).map(cb => cb.value);
                const options = Array.from(document.querySelectorAll('.option-cb:checked')).map(cb => cb.value);

                let html = "";
                if (prompts.includes('img') && q.target.img_path) html += `<img src="${q.target.img_path}" style="max-height:30vh; border-radius:10px;">`;
                if (prompts.includes('en')) html += `<div>${q.target.en.toUpperCase()}</div>`;
                if (prompts.includes('ja_hiragana')) html += `<div style="font-size:0.5em;">${q.target.ja_hiragana}</div>`;
                if (prompts.includes('en_katakana')) html += `<div style="font-size:0.5em; color:#8e44ad;">${q.target.en_katakana}</div>`;
                if (prompts.includes('ja_kanji')) html += `<div style="font-size:0.5em; color:#555;">${q.target.ja_kanji}</div>`;

                document.getElementById("current-question-display").innerHTML = html;
                document.getElementById("main-action-btn").innerText = "Reveal Answer";
                
                db.ref('trivia/gameState').set({
                    status: "LIVE", questionNumber: currentQuestionIndex, timeLimit: selectedTimeLimit,
                    displayRules: options, options: q.options, targetId: q.target.id,
                    startTime: firebase.database.ServerValue.TIMESTAMP
                });
                startVisualTimer(selectedTimeLimit);
            });
        }

        function startVisualTimer(dur) {
            clearInterval(countdownInterval);
            let left = dur;
            countdownInterval = setInterval(() => {
                left -= 100;
                document.getElementById('timer-bar').style.width = (left/dur)*100 + "%";
                if (left <= 0) revealAnswer();
            }, 100);
        }

        function revealAnswer() {
            if (gamePhase === "REVEAL") return;
            gamePhase = "REVEAL";
            clearInterval(countdownInterval);
            const q = questionQueue[currentQuestionIndex];
            
            db.ref('trivia/gameState/responses').once('value', snap => {
                const res = snap.val() || {}, updates = {};
                for (const id in res) {
                    if (res[id].answer === q.target.id) {
                        let pts = 500 + Math.max(0, Math.floor(500 * (1 - (res[id].timeTaken/selectedTimeLimit))));
                        updates[`trivia/players/${id}/score`] = (livePlayersData[id]?.score || 0) + pts;
                    }
                }
                db.ref().update(updates);
            });

            document.getElementById("current-question-display").innerHTML += `<div style="color:green; font-size:0.5em; margin-top:20px;">Correct Answer: ${q.target.en} (${q.target.ja_hiragana})</div>`;
            document.getElementById("main-action-btn").innerText = "Show Leaderboard";
            db.ref('trivia/gameState').update({ status: "REVEAL", correctAnswer: q.target.id });
            currentQuestionIndex++;
        }

        function showLeaderboard(final = false) {
            gamePhase = "LEADERBOARD";
            document.getElementById('timer-bar-container').style.display = "none";
            const top = Object.values(livePlayersData).sort((a,b) => b.score - a.score).slice(0, 5);
            document.getElementById("current-question-display").innerHTML = `<h2>${final?'Final Scores':'Top 5 Leaderboard'}</h2>` + top.map((p,i) => `<div class="leaderboard-row rank-${i+1}"><span>#${i+1} ${p.name}</span><span>${p.score} pts</span></div>`).join('');
            if (!final) document.getElementById("main-action-btn").innerText = "Next Question";
        }
    </script>
</body>
</html>
