<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Levi-Sensei Portal</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50; /* Matches your header theme */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quiz-portal-btn {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            background-color: #28a745; /* Success Green */
            color: white;
            width: 80vw;
            height: 50vh;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            transition: transform 0.2s, background-color 0.2s;
            text-align: center;
        }

        .quiz-portal-btn:hover {
            transform: scale(1.05);
            background-color: #218838;
        }

        .btn-title {
            font-size: 8vw;
            font-weight: 800;
            margin-bottom: 2vh;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .btn-subtitle {
            font-size: 3vw;
            opacity: 0.9;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <a href="play-quiz.html" class="quiz-portal-btn">
        <div class="btn-title">Vocabulary Quiz</div>
        <div class="btn-subtitle">Tap to Join the Game</div>
    </a>

</body>
</html>
