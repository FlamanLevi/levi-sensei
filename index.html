<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Dashboard</title>
    <style>
        /* Base settings for TV visibility */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            flex-direction: column;
        }

        /* Large, clean header */
        header {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 3vh 0;
            font-size: 3.5vh;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        /* Grid layout to maximize screen real estate */
        .dashboard-container {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 2vw;
            padding: 2vw;
        }

        /* Styling for the giant textbook buttons */
        .grade-card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            border-radius: 15px;
            color: white;
            transition: transform 0.2s, filter 0.2s;
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
            text-align: center;
            padding: 2vw;
        }

        .grade-card:hover {
            transform: scale(1.02);
            filter: brightness(1.1);
            cursor: pointer;
        }

        /* Colors matched to physical textbook covers */
        .grade-3 { background-color: #d81b60; } /* Pink (Let's Try 1) */
        .grade-4 { background-color: #2e7d32; } /* Green (Let's Try 2) */
        .grade-5 { background-color: #e67e22; } /* Orange (Here We Go 5) */
        .grade-6 { background-color: #1976d2; } /* Blue (Here We Go 6) */

        /* Massive typography for the back row */
        .grade-title {
            font-size: 5vw;
            font-weight: 800;
            margin-bottom: 1vh;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .book-title {
            font-size: 3vw;
            font-weight: 500;
            opacity: 0.9;
        }

    </style>
</head>
<body>

    <header>
        English Activities Dashboard
    </header>

    <div class="dashboard-container">
        <a href="grade3.html" class="grade-card grade-3">
            <div class="grade-title">Grade 3</div>
            <div class="book-title">Let's Try 1</div>
        </a>

        <a href="grade4.html" class="grade-card grade-4">
            <div class="grade-title">Grade 4</div>
            <div class="book-title">Let's Try 2</div>
        </a>

        <a href="grade5.html" class="grade-card grade-5">
            <div class="grade-title">Grade 5</div>
            <div class="book-title">Here We Go 5</div>
        </a>

        <a href="grade6.html" class="grade-card grade-6">
            <div class="grade-title">Grade 6</div>
            <div class="book-title">Here We Go 6</div>
        </a>
    </div>

</body>
</html>
