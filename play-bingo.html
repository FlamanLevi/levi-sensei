<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Bingo!</title>
    <style>
        /* Tablet-Optimized Base Settings */
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #ecf0f1; color: #2c3e50; display: flex; flex-direction: column; align-items: center; touch-action: manipulation; }
        header { background-color: #34495e; color: white; width: 100%; text-align: center; padding: 2vh 0; font-size: 4vh; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; padding: 2vh 0; }
        
        /* Phase 1: Login Gate */
        #login-phase { background: white; padding: 4vh 6vw; border-radius: 20px; box-shadow: 0 8px 15px rgba(0,0,0,0.1); text-align: center; width: 80%; max-width: 400px; }
        input { font-size: 4vh; padding: 2vh; margin-bottom: 2vh; width: 90%; border-radius: 10px; border: 2px solid #bdc3c7; text-align: center; font-weight: bold; text-transform: uppercase; }
        input::placeholder { text-transform: none; font-weight: normal; font-size: 3vh; }
        .btn-join { background-color: #27ae60; color: white; font-size: 4vh; font-weight: bold; padding: 2vh; width: 100%; border: none; border-radius: 10px; box-shadow: 0 6px 0 #2196f3; cursor: pointer; transition: transform 0.1s; }
        .btn-join:active { transform: translateY(6px); box-shadow: none; }

        /* Phase 2: Game Board */
        #game-phase { display: none; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .status-bar { font-size: 3vh; font-weight: bold; margin-bottom: 2vh; color: #7f8c8d; }
        .current-word-display { font-size: 5vh; font-weight: 900; color: #e74c3c; margin-bottom: 3vh; min-height: 6vh; }
        
        /* 3x3 Bingo Grid */
        .bingo-board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2vw; width: 90%; max-width: 600px; }
        .bingo-cell { aspect-ratio: 1 / 1; background: white; border-radius: 15px; box-shadow: 0 6px 10px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center; font-size: 3vh; font-weight: bold; text-align: center; padding: 1vw; cursor: pointer; border: 4px solid transparent; transition: all 0.2s; word-wrap: break-word; line-height: 1.2; }
        
        /* The "Stamped" State when tapped correctly */
        .bingo-cell.stamped { background-color: #2ecc71; color: white; transform: scale(0.95); box-shadow: inset 0 4px 8px rgba(0,0,0,0.2); }
        .bingo-cell.error { border-color: #e74c3c; animation: shake 0.4s; }

        /* Victory Screen */
        #victory-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f1c40f; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #victory-screen h1 { font-size: 10vh; color: white; text-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-10px); } 50% { transform: translateX(10px); } 75% { transform: translateX(-10px); } 100% { transform: translateX(0); } }

    </style>
</head>
<body>

    <header>Student Bingo</header>

    <div class="container">
        <div id="login-phase">
            <h2 style="font-size: 4vh; margin-top: 0;">Join the Game</h2>
            <input type="text" id="roomCodeInput" maxlength="4" placeholder="Room Code (e.g. ABCD)">
            <input type="text" id="nameInput" placeholder="Your Name">
            <button class="btn-join" id="joinBtn">JOIN</button>
        </div>

        <div id="game-phase" style="display: none;">
            <div class="status-bar" id="roomStatus">Room: ---- | Player: ----</div>
            <div class="current-word-display" id="tvWord">Listen to the Teacher...</div>
            <div class="bingo-board" id="board">
                </div>
        </div>
    </div>

    <div id="victory-screen">
        <h1>BINGO!</h1>
        <div style="font-size: 4vh; color: white;">Look at the TV!</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";

        // === YOUR KEYS ===
        const firebaseConfig = {
            apiKey: "AIzaSyC7lrhVICmKOL3EhVkiaTkpEE1_VUDPS7k",
            authDomain: "levi-sensei.firebaseapp.com",
            databaseURL: "https://levi-sensei-default-rtdb.asia-northeast1.firebasedatabase.app",
            projectId: "levi-sensei",
            storageBucket: "levi-sensei.firebasestorage.app",
            messagingSenderId: "14792482782",
            appId: "1:14792482782:web:bdc4db039fabce6360474f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // State Variables
        let myUid = "user_" + Date.now() + "_" + Math.floor(Math.random()*1000); // Unique ID for this tablet
        let roomCode = "";
        let myName = "";
        let activeCalledWords = [];
        let myGridData = []; 
        let hasWon = false;

        // 1. Join Logic
        document.getElementById('joinBtn').addEventListener('click', () => {
            roomCode = document.getElementById('roomCodeInput').value.toUpperCase().trim();
            myName = document.getElementById('nameInput').value.trim();
            
            if(roomCode.length !== 4 || myName === "") {
                alert("Please enter the 4-letter code and your name.");
                return;
            }

            // Ask Firebase if the room exists
            get(ref(db, `bingoRooms/${roomCode}`)).then(snapshot => {
                if (snapshot.exists()) {
                    const roomData = snapshot.val();
                    setupBoard(roomData.grade, roomData.unit);
                } else {
                    alert("Room not found! Did you copy the code off the TV correctly?");
                }
            }).catch(err => {
                alert("Connection error. Make sure you are online.");
            });
        });

        // 2. Build the Board Logic
        function setupBoard(grade, unit) {
            // Write this student into the Firebase room
            set(ref(db, `bingoRooms/${roomCode}/players/${myUid}`), {
                name: myName,
                hasBingo: false
            });

            // Update UI 
            document.getElementById('login-phase').style.display = 'none';
            document.getElementById('game-phase').style.display = 'flex';
            document.getElementById('roomStatus').textContent = `Room: ${roomCode} | Player: ${myName}`;

            // Fetch the vocabulary to build their unique card
            fetch('vocabulary.json')
                .then(response => response.json())
                .then(data => {
                    let wordsArray = [...data[grade][unit]];
                    
                    // Shuffle the words (Fisher-Yates Shuffle)
                    for (let i = wordsArray.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [wordsArray[i], wordsArray[j]] = [wordsArray[j], wordsArray[i]];
                    }

                    // Grab the first 9 words to make a 3x3 grid
                    // (If the unit has less than 9 words, it just repeats to fill the 9 spots so the game doesn't break)
                    myGridData = [];
                    for(let i=0; i<9; i++) {
                        myGridData.push(wordsArray[i % wordsArray.length]);
                    }

                    renderGrid();
                    startListening();
                });
        }

        // 3. Render the 3x3 HTML Grid
        function renderGrid() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            myGridData.forEach((word, index) => {
                const cell = document.createElement('div');
                cell.className = 'bingo-cell';
                cell.textContent = word;
                cell.dataset.index = index;
                cell.dataset.word = word;
                
                // Tap Logic
                cell.addEventListener('click', () => handleTap(cell));
                board.appendChild(cell);
            });
        }

        // 4. Listen for the Teacher's signals
        function startListening() {
            onValue(ref(db, `bingoRooms/${roomCode}`), (snapshot) => {
                if(!snapshot.exists()) {
                    // The teacher hit "End Game", kick the student out
                    alert("The teacher closed the room!");
                    location.reload();
                    return;
                }

                const data = snapshot.val();
                
                // Update the current word text
                if (data.currentWord) {
                    document.getElementById('tvWord').textContent = `"${data.currentWord}"`;
                }

                // Update the list of all words the teacher has drawn so far
                if (data.calledWords) {
                    activeCalledWords = data.calledWords;
                }
            });
        }

        // 5. Tablet Interaction Logic (Anti-Cheat Included)
        function handleTap(cell) {
            if (hasWon) return; // Stop playing if they already won
            if (cell.classList.contains('stamped')) return; // Already tapped

            const clickedWord = cell.dataset.word;

            // Did the teacher actually call this word?
            if (activeCalledWords.includes(clickedWord)) {
                // Correct!
                cell.classList.add('stamped');
                checkWinCondition();
            } else {
                // Incorrect! Show red flash error
                cell.classList.add('error');
                setTimeout(() => cell.classList.remove('error'), 400);
            }
        }

        // 6. Check for 3-in-a-row
        function checkWinCondition() {
            const cells = document.querySelectorAll('.bingo-cell');
            const lines = [
                [0, 1, 2], [3, 4, 5], [6, 7, 8], // Horizontal rows
                [0, 3, 6], [1, 4, 7], [2, 5, 8], // Vertical columns
                [0, 4, 8], [2, 4, 6]             // Diagonals
            ];

            for (let i = 0; i < lines.length; i++) {
                const [a, b, c] = lines[i];
                if (cells[a].classList.contains('stamped') && 
                    cells[b].classList.contains('stamped') && 
                    cells[c].classList.contains('stamped')) {
                    
                    // WINNER! Send signal to teacher TV
                    hasWon = true;
                    document.getElementById('victory-screen').style.display = 'flex';
                    update(ref(db, `bingoRooms/${roomCode}/players/${myUid}`), { hasBingo: true });
                    return;
                }
            }
        }
    </script>
</body>
</html>
