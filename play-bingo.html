<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Bingo!</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #ecf0f1; color: #2c3e50; display: flex; flex-direction: column; align-items: center; touch-action: manipulation; overflow-x: hidden; }
        header { background-color: #34495e; color: white; width: 100%; text-align: center; padding: 2vh 0; font-size: 4vh; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.1); flex-shrink: 0;}
        .container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; padding: 2vh 0; box-sizing: border-box; overflow: hidden;}
        
        #login-phase { background: white; padding: 4vh 6vw; border-radius: 20px; box-shadow: 0 8px 15px rgba(0,0,0,0.1); text-align: center; width: 80%; max-width: 400px; }
        input { font-size: 4vh; padding: 2vh; margin-bottom: 2vh; width: 90%; border-radius: 10px; border: 2px solid #bdc3c7; text-align: center; font-weight: bold; text-transform: uppercase; box-sizing: border-box;}
        input::placeholder { text-transform: none; font-weight: normal; font-size: 3vh; }
        .btn-join { background-color: #27ae60; color: white; font-size: 4vh; font-weight: bold; padding: 2vh; width: 100%; border: none; border-radius: 10px; box-shadow: 0 6px 0 #2196f3; cursor: pointer; transition: transform 0.1s; }
        .btn-join:active { transform: translateY(6px); box-shadow: none; }

        #game-phase { display: none; width: 100%; max-width: 100vw; display: flex; flex-direction: column; align-items: center; flex: 1; overflow: hidden; box-sizing: border-box;}
        .status-bar { font-size: 3vh; font-weight: bold; margin-bottom: 1vh; color: #7f8c8d; flex-shrink: 0;}
        .current-word-display { font-size: 4vh; font-weight: 900; color: #e74c3c; margin-bottom: 1vh; min-height: 5vh; text-align: center; flex-shrink: 0;}
        
        /* The Vertical "Wrap" Ledger */
        #student-history-container { 
            width: 95%; 
            max-width: 700px; 
            height: 12vh; /* Fixed vertical height */
            overflow-y: auto; /* Scroll vertically when full */
            background: rgba(0,0,0,0.05); 
            border-radius: 10px; 
            padding: 1vh; 
            margin-bottom: 2vh; 
            display: flex; 
            flex-wrap: wrap; /* Wrap words to the next line */
            gap: 1vh; 
            justify-content: center; 
            align-content: flex-start;
            box-sizing: border-box; 
            flex-shrink: 0;
        }
        .history-tag { background: #95a5a6; color: white; padding: 0.5vh 3vw; border-radius: 15px; font-size: 2vh; font-weight: bold; white-space: nowrap; }

        /* The Bingo Board with Vertical Safety Constraint */
        .bingo-board { display: grid; gap: 1.5vw; width: 95%; max-width: 60vh; /* STRICT height-based width limit */ flex: 1; align-content: center; justify-content: center;}
        .bingo-cell { aspect-ratio: 1 / 1; background: white; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: center; font-size: clamp(1.8vh, 2vw, 3vh); font-weight: bold; text-align: center; padding: 1vw; cursor: pointer; border: 4px solid transparent; transition: all 0.2s; word-wrap: break-word; line-height: 1.2; user-select: none; box-sizing: border-box;}
        .bingo-cell.stamped { background-color: #2ecc71; color: white; transform: scale(0.95); box-shadow: inset 0 4px 8px rgba(0,0,0,0.2); border-color: #27ae60;}
        .bingo-cell.error { border-color: #e74c3c; animation: shake 0.4s; }
        .bingo-cell.free-space { background-color: #f1c40f; color: #2c3e50; border-color: #f39c12; cursor: default;}

        .btn-leave { background: transparent; color: #95a5a6; border: none; font-size: 2vh; margin-top: 2vh; cursor: pointer; text-decoration: underline; flex-shrink: 0;}

        #victory-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f1c40f; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #victory-screen h1 { font-size: 10vh; color: white; text-shadow: 0 5px 15px rgba(0,0,0,0.2); }

        @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-10px); } 50% { transform: translateX(10px); } 75% { transform: translateX(-10px); } 100% { transform: translateX(0); } }
    </style>
</head>
<body>

    <header>Student Bingo</header>

    <div class="container">
        <div id="login-phase">
            <h2 style="font-size: 4vh; margin-top: 0;">Join the Game</h2>
            <input type="text" id="roomCodeInput" maxlength="4" placeholder="Room Code (e.g. ABCD)">
            <input type="text" id="nameInput" placeholder="Your Name">
            <button class="btn-join" id="joinBtn">JOIN</button>
        </div>

        <div id="game-phase" style="display: none;">
            <div class="status-bar" id="roomStatus">Room: ---- | Player: ----</div>
            <div class="current-word-display" id="tvWord">Listen to the Teacher...</div>
            
            <div id="student-history-container"></div>

            <div class="bingo-board" id="board"></div>
            <button class="btn-leave" id="leaveBtn">Leave Room</button>
        </div>
    </div>

    <div id="victory-screen">
        <h1>BINGO!</h1>
        <div style="font-size: 4vh; color: white;">Look at the TV!</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, update } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC7lrhVICmKOL3EhVkiaTkpEE1_VUDPS7k",
            authDomain: "levi-sensei.firebaseapp.com",
            databaseURL: "https://levi-sensei-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "levi-sensei",
            storageBucket: "levi-sensei.firebasestorage.app",
            messagingSenderId: "14792482782",
            appId: "1:14792482782:web:bdc4db039fabce6360474f"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // State Variables
        let myUid = "user_" + Date.now() + "_" + Math.floor(Math.random()*1000); 
        let roomCode = "";
        let myName = "";
        let activeCalledWords = [];
        let myGridData = []; 
        let hasWon = false;
        let gridSize = 3;
        let hasFreeSpace = false;

        // --- SESSION RECOVERY PROTOCOL ---
        const savedSession = sessionStorage.getItem('bingoSession');
        if (savedSession) {
            const parsed = JSON.parse(savedSession);
            myUid = parsed.myUid;
            roomCode = parsed.roomCode;
            myName = parsed.myName;
            myGridData = parsed.myGridData;
            gridSize = parsed.gridSize;
            hasFreeSpace = parsed.hasFreeSpace;

            document.getElementById('login-phase').style.display = 'none';
            document.getElementById('game-phase').style.display = 'flex';
            document.getElementById('roomStatus').textContent = `Room: ${roomCode} | Player: ${myName}`;
            
            renderGrid();
            startListening();
        }

        // --- NORMAL JOIN LOGIC ---
        document.getElementById('joinBtn').addEventListener('click', () => {
            roomCode = document.getElementById('roomCodeInput').value.toUpperCase().trim();
            myName = document.getElementById('nameInput').value.trim();
            
            if(roomCode.length !== 4 || myName === "") { alert("Please enter the 4-letter code and your name."); return; }

            get(ref(db, `bingoRooms/${roomCode}`)).then(snapshot => {
                if (snapshot.exists()) {
                    const roomData = snapshot.val();
                    gridSize = roomData.gridSize || 3;
                    hasFreeSpace = roomData.hasFreeSpace || false;
                    setupBoard(roomData.grade, roomData.unit);
                } else {
                    alert("Room not found! Did you copy the code off the TV correctly?");
                }
            }).catch(err => { alert("Connection error. Make sure you are online."); });
        });

        function setupBoard(grade, unit) {
            set(ref(db, `bingoRooms/${roomCode}/players/${myUid}`), { name: myName, hasBingo: false });

            document.getElementById('login-phase').style.display = 'none';
            document.getElementById('game-phase').style.display = 'flex';
            document.getElementById('roomStatus').textContent = `Room: ${roomCode} | Player: ${myName}`;

            fetch('vocabulary.json')
                .then(response => response.json())
                .then(data => {
                    let wordsArray = [...data[grade][unit]];
                    for (let i = wordsArray.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [wordsArray[i], wordsArray[j]] = [wordsArray[j], wordsArray[i]];
                    }

                    const totalSquares = gridSize * gridSize;
                    myGridData = [];
                    for(let i=0; i < totalSquares; i++) myGridData.push(wordsArray[i % wordsArray.length]);

                    sessionStorage.setItem('bingoSession', JSON.stringify({
                        myUid, roomCode, myName, myGridData, gridSize, hasFreeSpace, stampedIndices: []
                    }));

                    renderGrid();
                    startListening();
                });
        }

        function renderGrid() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            board.style.gridTemplateColumns = `repeat(${gridSize}, 1fr)`;
            const centerIndex = Math.floor((gridSize * gridSize) / 2);

            let session = JSON.parse(sessionStorage.getItem('bingoSession'));
            let stampedIndices = session ? (session.stampedIndices || []) : [];

            myGridData.forEach((word, index) => {
                const cell = document.createElement('div');
                cell.className = 'bingo-cell';
                
                if (hasFreeSpace && index === centerIndex) {
                    cell.textContent = "FREE SPACE";
                    cell.classList.add('stamped', 'free-space'); 
                    cell.dataset.word = "FREE SPACE";
                } else {
                    cell.textContent = word;
                    cell.dataset.word = word;
                    if (stampedIndices.includes(index.toString()) || stampedIndices.includes(index)) {
                        cell.classList.add('stamped');
                    }
                    cell.addEventListener('click', () => handleTap(cell));
                }
                
                cell.dataset.index = index;
                board.appendChild(cell);
            });
        }

        function startListening() {
            onValue(ref(db, `bingoRooms/${roomCode}`), (snapshot) => {
                if(!snapshot.exists()) {
                    sessionStorage.removeItem('bingoSession'); 
                    alert("The teacher closed the room!");
                    location.reload();
                    return;
                }
                const data = snapshot.val();
                if (data.currentWord) document.getElementById('tvWord').textContent = `"${data.currentWord}"`;
                
                if (data.calledWords) {
                    activeCalledWords = data.calledWords;
                    
                    // --- Update the UI Ledger (Vertical Scroll) ---
                    const historyPanel = document.getElementById('student-history-container');
                    historyPanel.innerHTML = '';
                    activeCalledWords.forEach(word => {
                        const tag = document.createElement('div');
                        tag.className = 'history-tag';
                        tag.textContent = word;
                        historyPanel.appendChild(tag);
                    });
                    // Auto-scroll the vertical ledger to the bottom
                    historyPanel.scrollTop = historyPanel.scrollHeight;
                }
            });
        }

        function handleTap(cell) {
            if (hasWon || cell.classList.contains('stamped')) return; 
            const clickedWord = cell.dataset.word;
            if (activeCalledWords.includes(clickedWord)) {
                cell.classList.add('stamped');
                
                let session = JSON.parse(sessionStorage.getItem('bingoSession'));
                if (session) {
                    session.stampedIndices.push(cell.dataset.index);
                    sessionStorage.setItem('bingoSession', JSON.stringify(session));
                }

                checkWinCondition();
            } else {
                cell.classList.add('error');
                setTimeout(() => cell.classList.remove('error'), 400);
            }
        }

        function checkWinCondition() {
            const cells = document.querySelectorAll('.bingo-cell');
            let isWin = false;
            const checkLine = (indices) => indices.every(i => cells[i] && cells[i].classList.contains('stamped'));

            for (let r = 0; r < gridSize; r++) {
                let row = [];
                for (let c = 0; c < gridSize; c++) row.push(r * gridSize + c);
                if (checkLine(row)) isWin = true;
            }
            for (let c = 0; c < gridSize; c++) {
                let col = [];
                for (let r = 0; r < gridSize; r++) col.push(r * gridSize + c);
                if (checkLine(col)) isWin = true;
            }
            let diag1 = [], diag2 = [];
            for (let i = 0; i < gridSize; i++) {
                diag1.push(i * gridSize + i); 
                diag2.push(i * gridSize + (gridSize - 1 - i)); 
            }
            if (checkLine(diag1) || checkLine(diag2)) isWin = true;

            if (isWin && !hasWon) {
                hasWon = true;
                document.getElementById('victory-screen').style.display = 'flex';
                update(ref(db, `bingoRooms/${roomCode}/players/${myUid}`), { hasBingo: true });
            }
        }

        document.getElementById('leaveBtn').addEventListener('click', () => {
            sessionStorage.removeItem('bingoSession');
            location.reload();
        });
    </script>
</body>
</html>
