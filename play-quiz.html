<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Levi-Sensei Trivia: Player</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f9; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #join-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 20px; text-align: center; }
        input { font-size: 1.5em; padding: 15px; margin: 10px; border-radius: 10px; border: 2px solid #ccc; width: 80%; max-width: 300px; text-align: center; }
        .join-btn { font-size: 1.5em; padding: 15px 40px; background: #007bff; color: white; border: none; border-radius: 10px; width: 80%; max-width: 300px; cursor: pointer; }

        #waiting-screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; background: #007bff; color: white; }

        #game-grid { display: none; gap: 10px; padding: 10px; height: 100vh; box-sizing: border-box; }
        @media (orientation: landscape) { #game-grid { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; } }
        @media (orientation: portrait) { #game-grid { grid-template-columns: 1fr; grid-template-rows: repeat(4, 1fr); } }

        .answer-btn { border: none; border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; font-weight: bold; cursor: pointer; padding: 10px; transition: transform 0.1s, opacity 0.2s; }
        .answer-btn:active { transform: scale(0.95); }
        
        /* The Lockout State - Faded Original Colors */
        .locked { opacity: 0.4; cursor: not-allowed; pointer-events: none; transform: none !important; }
        
        .btn-red { background-color: #e21b3c; }
        .btn-blue { background-color: #1368ce; }
        .btn-yellow { background-color: #d89e00; }
        .btn-green { background-color: #26890c; }

        .shape { font-size: 2em; margin-bottom: 5px; opacity: 0.7; }
        .btn-text-container { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .btn-text-line { font-size: 1.2em; line-height: 1.1; margin: 0; }

        #result-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center; }
        .bg-correct { background-color: #26890c !important; }
        .bg-wrong { background-color: #e21b3c !important; }
        
        .streak-badge { font-size: 1.2em; background: rgba(0,0,0,0.3); padding: 12px 30px; border-radius: 40px; margin: 15px 0; font-weight: bold; border: 2px solid rgba(255,255,255,0.4); display: none; }
        .near-miss { font-size: 0.7em; margin-top: 25px; font-weight: normal; font-style: italic; opacity: 0.9; }
    </style>
</head>
<body>

    <div id="join-screen">
        <h1 style="color: #2c3e50;">Levi-Sensei Trivia</h1>
        <input type="number" id="pin-input" placeholder="Room PIN">
        <input type="text" id="name-input" placeholder="Nickname" maxlength="12">
        <button class="join-btn" onclick="joinRoom()">Join Game</button>
    </div>

    <div id="waiting-screen">
        <h2 style="font-size: 2em;">You're in!</h2>
        <p>Get ready...</p>
    </div>

    <div id="game-grid">
        <button class="answer-btn btn-red" onclick="submitAnswer(0)" id="btn-0">
            <span class="shape">▲</span>
            <div class="btn-text-container" id="txt-0"></div>
        </button>
        <button class="answer-btn btn-blue" onclick="submitAnswer(1)" id="btn-1">
            <span class="shape">◆</span>
            <div class="btn-text-container" id="txt-1"></div>
        </button>
        <button class="answer-btn btn-yellow" onclick="submitAnswer(2)" id="btn-2">
            <span class="shape">●</span>
            <div class="btn-text-container" id="txt-2"></div>
        </button>
        <button class="answer-btn btn-green" onclick="submitAnswer(3)" id="btn-3">
            <span class="shape">■</span>
            <div class="btn-text-container" id="txt-3"></div>
        </button>
    </div>

    <div id="result-overlay">
        <div id="status-msg" style="font-size: 2.2em; font-weight: bold;"></div>
        <div id="streak-msg" class="streak-badge"></div>
        <div id="score-display" style="font-size: 1.3em; margin-top: 5px;">0 pts</div>
        <div id="miss-msg" class="near-miss"></div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC7lrhVICmKOL3EhVkiaTkpEE1_VUDPS7k",
            authDomain: "levi-sensei.firebaseapp.com",
            databaseURL: "https://levi-sensei-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "levi-sensei",
            storageBucket: "levi-sensei.firebasestorage.app",
            messagingSenderId: "14792482782",
            appId: "1:14792482782:web:13ae42685a94b96460474f"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let myId = "";
        let currentOptions = [];
        let streak = 0;
        let myScore = 0;
        let questionStartTime = 0;
        
        // Phase Tracking to prevent invisible UI reloads
        let currentPhase = "";
        let currentQuestionNum = -1;

        function joinRoom() {
            const pin = document.getElementById('pin-input').value;
            const name = document.getElementById('name-input').value.trim();
            if (!pin || !name) return;

            db.ref('trivia/room').once('value').then(snap => {
                if (snap.val() && snap.val().roomCode === pin) {
                    myId = "u_" + Math.random().toString(36).substr(2, 5);
                    db.ref(`trivia/players/${myId}`).set({ name: name, score: 0 });
                    document.getElementById('join-screen').style.display = "none";
                    document.getElementById('waiting-screen').style.display = "flex";
                    startGameStateListener();
                } else { alert("Wrong PIN"); }
            });
        }

        function gameStateListener() {
            db.ref('trivia/gameState').on('value', snap => {
                const state = snap.val();
                if (!state) return;

                if (state.status === "LIVE") {
                    if (currentPhase !== "LIVE" || currentQuestionNum !== state.questionNumber) {
                        currentPhase = "LIVE";
                        currentQuestionNum = state.questionNumber;
                        
                        questionStartTime = Date.now();
                        currentOptions = state.options;
                        
                        document.getElementById('waiting-screen').style.display = "none";
                        document.getElementById('result-overlay').style.display = "none";
                        document.getElementById('game-grid').style.display = "grid";
                        
                        for (let i = 0; i < 4; i++) {
                            const btn = document.getElementById(`btn-${i}`);
                            const container = document.getElementById(`txt-${i}`);
                            btn.disabled = false;
                            btn.classList.remove('locked');
                            container.innerHTML = "";
                            
                            state.displayRules.forEach(rule => {
                                if (currentOptions[i][rule]) {
                                    const line = document.createElement('div');
                                    line.className = "btn-text-line";
                                    line.innerText = currentOptions[i][rule];
                                    container.appendChild(line);
                                }
                            });

                            if (container.innerHTML === "") {
                                container.innerHTML = `<div class="btn-text-line">${currentOptions[i].ja_hiragana || "???"}</div>`;
                            }
                        }
                    }
                } else if (state.status === "REVEAL") {
                    if (currentPhase !== "REVEAL") {
                        currentPhase = "REVEAL";
                        handleReveal(state);
                    }
                } else if (state.status === "CLOSED") {
                    if (currentPhase !== "CLOSED") {
                        currentPhase = "CLOSED";
                        document.getElementById('game-grid').style.display = "none";
                        const overlay = document.getElementById('result-overlay');
                        
                        overlay.style.display = "flex";
                        overlay.classList.remove('bg-correct', 'bg-wrong');
                        overlay.style.backgroundColor = "#343a40"; 
                        
                        document.getElementById('status-msg').innerText = "Class Dismissed! 🎒";
                        document.getElementById('score-display').innerText = "Closing room...";
                        document.getElementById('streak-msg').style.display = "none";
                        document.getElementById('miss-msg').innerText = "";
                        
                        setTimeout(() => { location.reload(); }, 2000);
                    }
                }
            });

            db.ref(`trivia/players/${myId}/score`).on('value', snap => {
                myScore = snap.val() || 0;
                document.getElementById('score-display').innerText = myScore + " pts";
            });
        }

        function submitAnswer(idx) {
            for (let i = 0; i < 4; i++) {
                const btn = document.getElementById(`btn-${i}`);
                btn.disabled = true;
                btn.classList.add('locked');
            }
            
            db.ref(`trivia/gameState/responses/${myId}`).set({
                answer: currentOptions[idx].id,
                timeTaken: Date.now() - questionStartTime
            });
        }

        function handleReveal(state) {
            document.getElementById('game-grid').style.display = "none";
            const overlay = document.getElementById('result-overlay');
            const msg = document.getElementById('status-msg');
            const streakBar = document.getElementById('streak-msg');
            
            overlay.style.display = "flex";
            overlay.classList.remove('bg-correct', 'bg-wrong');

            db.ref(`trivia/gameState/responses/${myId}`).once('value').then(snap => {
                const myAns = snap.val() ? snap.val().answer : null;
                
                if (myAns === state.correctAnswer) {
                    msg.innerText = "CORRECT! 🌟";
                    overlay.classList.add('bg-correct');
                    streak++;
                    
                    if (streak >= 2) {
                        streakBar.innerText = `🔥 ${streak} IN A ROW!`;
                        streakBar.style.display = "inline-block"; 
                    } else {
                        streakBar.style.display = "none";
                    }
                } else {
                    msg.innerText = myAns ? "WRONG 😅" : "TIME UP! ⏰";
                    overlay.classList.add('bg-wrong');
                    streak = 0;
                    streakBar.style.display = "none";
                }
                
                db.ref('trivia/players').once('value').then(pSnap => {
                    const playersData = pSnap.val() || {};
                    const playersArray = Object.keys(playersData).map(id => ({
                        id: id,
                        score: playersData[id].score || 0
                    })).sort((a,b) => b.score - a.score);

                    const myRank = playersArray.findIndex(p => p.id === myId) + 1;
                    
                    if (myRank > 5 && playersArray.length >= 5) {
                        const gap = playersArray[4].score - myScore;
                        document.getElementById('miss-msg').innerText = `You are ${gap} pts away from the Top 5!`;
                    } else if (myRank <= 5 && myRank > 0) {
                        document.getElementById('miss-msg').innerText = "You are in the Top 5! 🏆";
                    } else {
                        document.getElementById('miss-msg').innerText = "";
                    }
                });
            });
        }
        
        function startGameStateListener() { gameStateListener(); }
    </script>
</body>
</html>
